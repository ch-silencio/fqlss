<!-- layouts/partials/sidebar/categories.html -->



    <!-- 左侧栏 -->
<div class="sidebar">
    <div class="divider"></div>
        <div class="qr-section">
            <div class="qr-item">
                <div class="qr-code"><img src="https://img.fqlss.com/img/公众号.jpg"></div>
                <div class="qr-info">
                    <div class="qr-title">微信公众号</div>
                    <div class="qr-desc">扫码关注</div>
                </div>
            </div>
            <div class="qr-item">
                <div class="qr-code"><img src="https://img.fqlss.com/img/微信号.png"></div>
                <div class="qr-info">
                    <div class="qr-title">微信号</div>
                    <div class="qr-desc">Awls6868</div>
                </div>
            </div>
        </div>
        
        <div class="divider"></div>

<!-- 文章分类 -->
<div class="category-section">
    <span class="category-title">文章分类</span>
    <ul class="category-list">
{{ with .Site.GetPage "taxonomy" "categories" }}
  {{ range .Pages.ByWeight }}
        <li class="category-item">
            <a href="{{ .RelPermalink }}" class="category-name">
                <span class="category-icon">◈</span>
                {{ .Title }}
                <span class="category-count">{{ len .Pages }}</span>
            </a>
        </li>
        {{ end }}
          {{ end }}
    </ul>
</div>
<div class="divider"></div>
