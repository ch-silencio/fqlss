{{- $IsList := .IsList -}}
{{- $Page := .Page -}}
<div class="article-details">


    <div class="article-title-wrapper">
        <h2 class="article-title" style="text-align: center;">
            <a href="{{ $Page.RelPermalink }}">
                {{- $Page.Title -}}
            </a>
        </h2>
    
        {{ with $Page.Params.description }}
        <h3 class="article-subtitle">
            {{ . }}
        </h3>
        {{ end }}
    </div>

</div>
